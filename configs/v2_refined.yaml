# V2 Refined — Enable all three post-prediction refinement stages
# Inherits from base.yaml; only overrides the refinement flags.
_base: base.yaml
name: v2_refined
description: "v1 + scale clamping + contour resampling + selective snap (anchors only)"

model:
  refine:
    clamp: true
    scale_bounds: [0.92, 1.08]
    resample: true
    selective_snap: true
    legacy_snap: false
