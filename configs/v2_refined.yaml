# V2 Refined — Contour resampling + selective snap (no scale clamp)
# Scale clamp dropped: transform["s"] is the SSM-normalization scale (~0.01-0.02),
# NOT a predicted-vs-truth size ratio. Clamping it is meaningless.
_base: base.yaml
name: v2_refined
description: "v1 + contour resampling + selective anchor snap (no clamp)"

model:
  refine:
    clamp: false
    resample: true
    selective_snap: true
    legacy_snap: false
